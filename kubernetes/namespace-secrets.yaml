apiVersion: v1
kind: Namespace
metadata:
  name: workflow

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: workflow
type: Opaque
stringData:
  username: workflow_user
  password: workflow_password

---
apiVersion: v1
kind: Secret
metadata:
  name: mail-secrets
  namespace: workflow
type: Opaque
stringData:
  username: your-email@gmail.com
  password: your-app-password
